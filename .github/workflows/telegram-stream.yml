name: Telegram Stream

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: telegram-stream
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Process Telegram updates
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_CHAT_ID: ${{ secrets.TELEGRAM_ALLOWED_CHAT_ID }}
          STREAM_TIMEZONE: Asia/Kolkata
        run: node scripts/telegram-stream.mjs

      - name: Commit and push content updates
        run: |
          if git diff --quiet; then
            echo "No repository changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/ .stream-state/
          git commit -m "Publish Telegram stream entries"
          git push
